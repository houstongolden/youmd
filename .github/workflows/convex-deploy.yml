name: Convex Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'convex/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Convex
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ (github.event_name == 'push' || inputs.environment == 'prod') && secrets.CONVEX_PROD_DEPLOY_KEY || secrets.CONVEX_DEV_DEPLOY_KEY }}
