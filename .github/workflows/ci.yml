name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Warn-only until the lint-zero cleanup (backlog T31) lands, then remove
      # continue-on-error to make this blocking. 169 pre-existing errors as of
      # 2026-06-11 — do not add new ones.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build web app
        run: npx next build
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}

      - name: CLI tests
        run: cd cli && npm ci && npm test
