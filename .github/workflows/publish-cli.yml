name: Publish CLI to npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci --ignore-scripts

      - name: Test CLI
        working-directory: cli
        run: npm test

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Publish CLI
        working-directory: cli
        run: npm publish
