name: Publish CLI to npm

on:
  workflow_dispatch:
  # Autonomous publish: a version bump landing on main publishes itself.
  push:
    branches: [main]
    paths:
      - "cli/package.json"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci --ignore-scripts

      - name: Use latest npm with OIDC support
        run: |
          npm install -g npm@latest
          npm --version

      - name: Test CLI
        working-directory: cli
        run: npm test

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Skip if this version is already published
        id: published
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "youmd@$VERSION" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "youmd@$VERSION already on npm — nothing to publish"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
            echo "youmd@$VERSION not yet published — will publish"
          fi

      - name: Publish CLI
        if: steps.published.outputs.already == 'false'
        working-directory: cli
        run: npm publish --provenance --access public
