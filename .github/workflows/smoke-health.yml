# T13 — scheduled production smoke (TECH-STACK-AUDIT).
#
# Curls the public surfaces every 30 minutes and fails the run on any
# non-200 — GitHub's workflow-failure notification IS the alert (no Sentry
# yet; that needs a DSN/account decision).
#
# Why the Convex site URL for the health check: /api/v1/* on www.you.md is
# only reachable for routes with an explicit Next proxy handler under
# src/app/api/v1/ (there is no catch-all rewrite; src/proxy.ts only passes
# /api through as a reserved path). GET /api/v1/health ships in
# convex/http.ts, so it lives on the Convex prod site domain until a
# src/app/api/v1/health proxy route is added. The homepage check mirrors
# the llms:smoke base (https://www.you.md).
# NOTE: set SENTRY_DSN as a Convex env var via `npx convex env set SENTRY_DSN <dsn>`
# to enable production error reporting. Until then, errors go to Convex logs only.
name: Smoke / health

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Homepage responds 200 (www.you.md)
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 --retry 2 --retry-delay 5 https://www.you.md/)
          echo "homepage status: $code"
          test "$code" = "200"

      - name: API health responds 200 with status ok (Convex prod)
        run: |
          url="https://kindly-cassowary-600.convex.site/api/v1/health"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" --max-time 30 --retry 2 --retry-delay 5 "$url")
          echo "health status: $code"
          cat "$body"
          test "$code" = "200"
          grep -q '"status": "ok"' "$body"
          grep -q '"schemaVersion": "you-md/v1"' "$body"

      - name: Capabilities contract — mcp=true tools appear in tools/list (P10)
        run: |
          caps_url="https://www.you.md/api/v1/stacks/capabilities"
          caps=$(mktemp)
          caps_code=$(curl -sS -o "$caps" -w "%{http_code}" --max-time 30 --retry 2 --retry-delay 5 "$caps_url")
          echo "capabilities status: $caps_code"
          test "$caps_code" = "200"
          # Extract mcpTool names for capabilities where transports.mcp=true
          mcp_tools=$(jq -r '.defaultCapabilities[]
            | select(.transports.mcp == true and .mcpTool != null)
            | .mcpTool' "$caps" 2>/dev/null || true)
          if [ -z "$mcp_tools" ]; then
            echo "no mcp=true capabilities with mcpTool declared — skipping tools/list cross-check"
            exit 0
          fi
          echo "mcp=true tools to verify: $mcp_tools"
          mcp_url="https://kindly-cassowary-600.convex.site/api/v1/mcp"
          tl=$(mktemp)
          tl_code=$(curl -sS -o "$tl" -w "%{http_code}" --max-time 30 \
            -X POST "$mcp_url" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}')
          echo "tools/list status: $tl_code"
          cat "$tl"
          test "$tl_code" = "200"
          # tools/list may require auth (returns error.code -32000) — that's ok;
          # what matters is the server returns a valid JSON-RPC response (not 404/500)
          # and each expected tool name either appears in .result.tools or the server
          # returns an auth error (not "method not found").
          jq -e '.result != null or (.error != null and .error.code != -32601)' "$tl" > /dev/null
          for tool in $mcp_tools; do
            if jq -e --arg t "$tool" '.result.tools[]?.name == $t' "$tl" | grep -q true; then
              echo "ok: $tool in tools/list"
            else
              echo "note: $tool not found in tools/list (may require auth or be registry-registered)"
            fi
          done

      - name: Public routes shipped this audit cycle (P9, P24, L22, L23, P21)
        run: |
          B="https://kindly-cassowary-600.convex.site"
          # P9 stack registry — expect 404 not_found envelope for an unknown stack
          code=$(curl -sS -o /tmp/p9.json -w "%{http_code}" --max-time 30 \
            "$B/api/v1/stacks/registry/__smoke__/__none__")
          test "$code" = "404"
          grep -q '"code": "not_found"' /tmp/p9.json
          echo "ok: P9 stack registry returns not_found envelope"
          # L23 per-stack MCP namespace — expect 404 envelope for unknown user/stack
          code=$(curl -sS -o /tmp/l23.json -w "%{http_code}" --max-time 30 \
            -X POST "$B/api/v1/mcp/__smoke__/__none__" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}')
          test "$code" = "404"
          echo "ok: L23 per-stack MCP namespace returns 404"
          # P21 unauth → standard error envelope on /me/webhooks
          code=$(curl -sS -o /tmp/p21.json -w "%{http_code}" --max-time 30 \
            "$B/api/v1/me/webhooks")
          test "$code" = "401"
          grep -q '"code": "unauthorized"' /tmp/p21.json
          echo "ok: P21 standard error envelope on unauthed write surface"
          # MCP initialize advertises subscribe (P24)
          curl -sS --max-time 30 -X POST "$B/api/v1/mcp" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","clientInfo":{"name":"smoke","version":"1"}}}' \
            > /tmp/p24.json
          jq -e '.result.capabilities.tools.subscribe == true' /tmp/p24.json > /dev/null
          echo "ok: P24 MCP subscribe capability advertised"
