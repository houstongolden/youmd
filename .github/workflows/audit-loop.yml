name: Audit Loop

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atomic lock — skip if already running
        run: mkdir project-context/audits/auto/.lock || exit 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Run typecheck
        id: tsc
        run: |
          if npx tsc --noEmit 2>&1; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lint
        id: lint
        run: |
          if npm run lint 2>&1; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Count tests
        id: tests
        run: |
          COUNT=$(cd cli && npm test -- --reporter=verbose 2>&1 | grep -c " ✓ \| × " || true)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Write findings
        run: |
          DAY=$(date +%F)
          DIR="project-context/audits/auto/$DAY"
          mkdir -p "$DIR"
          FILE="$DIR/findings.md"
          echo "tsc: ${{ steps.tsc.outputs.result }}" > "$FILE"
          echo "lint: ${{ steps.lint.outputs.result }}" >> "$FILE"
          echo "tests: ${{ steps.tests.outputs.count }}" >> "$FILE"

      - name: Commit findings if new
        run: |
          DAY=$(date +%F)
          FILE="project-context/audits/auto/$DAY/findings.md"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          if git diff --cached --quiet; then
            echo "no new findings — skipping commit"
          else
            git commit -m "chore: audit findings $DAY"
            git push
          fi

      - name: Release lock
        if: always()
        run: rmdir project-context/audits/auto/.lock || true
