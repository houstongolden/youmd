name: Agent Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/agent-docs.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/generate-docs-reference.mjs"
      - "scripts/generate-llms-docs.mjs"
      - "scripts/smoke-agent-docs.mjs"
      - "src/generated/**"
      - "src/app/(app)/docs/**"
      - "src/app/robots.ts"
      - "src/app/sitemap.ts"
      - "public/llms.txt"
      - "public/llms-full.txt"
      - "project-context/reference-intelligence/**"
  pull_request:
    paths:
      - ".github/workflows/agent-docs.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/generate-docs-reference.mjs"
      - "scripts/generate-llms-docs.mjs"
      - "scripts/smoke-agent-docs.mjs"
      - "src/generated/**"
      - "src/app/(app)/docs/**"
      - "src/app/robots.ts"
      - "src/app/sitemap.ts"
      - "public/llms.txt"
      - "public/llms-full.txt"
      - "project-context/reference-intelligence/**"
  workflow_dispatch:

jobs:
  check:
    name: Check Generated Agent Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check generated agent docs
        run: npm run agent-docs:ci
